[build]
  base = "GLAWay/server"
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "CAMPUS_TIMEZONE"
  SECRETS_SCAN_OMIT_PATHS = "node_modules/.cache/**"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/.netlify/functions/api"
  status = 200
